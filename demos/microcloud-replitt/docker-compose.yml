services:
  dashboard:
    image: nginx:alpine
    container_name: era-microcloud-dashboard
    ports:
      - "18080:80"
    volumes:
      - ./dashboard/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - orchestrator
      - workspace
    networks:
      - demo

  orchestrator:
    build:
      context: ./orchestrator
    container_name: era-microcloud-orchestrator
    ports:
      - "18081:8080"
    environment:
      MEMPALACE_CONFIG: /config/mempalace.yaml
      NODE_URLS: "http://node-a:5678,http://node-b:5678,http://node-c:5678"
    volumes:
      - ../../mempalace.yaml:/config/mempalace.yaml:ro
    depends_on:
      - node-a
      - node-b
      - node-c
    networks:
      - demo

  workspace:
    image: codercom/code-server:latest
    container_name: era-microcloud-workspace
    ports:
      - "18443:8080"
    environment:
      PASSWORD: demo
      SUDO_PASSWORD: demo
    volumes:
      - ./workspace:/home/coder/project
    networks:
      - demo

  node-a:
    image: hashicorp/http-echo:1.0.0
    container_name: era-microcloud-node-a
    command: ["-text={\"node\":\"node-a\",\"role\":\"compute\",\"status\":\"ready\"}", "-listen=:5678"]
    networks:
      - demo

  node-b:
    image: hashicorp/http-echo:1.0.0
    container_name: era-microcloud-node-b
    command: ["-text={\"node\":\"node-b\",\"role\":\"storage\",\"status\":\"ready\"}", "-listen=:5678"]
    networks:
      - demo

  node-c:
    image: hashicorp/http-echo:1.0.0
    container_name: era-microcloud-node-c
    command: ["-text={\"node\":\"node-c\",\"role\":\"edge\",\"status\":\"ready\"}", "-listen=:5678"]
    networks:
      - demo

networks:
  demo:
    name: era-microcloud-demo
