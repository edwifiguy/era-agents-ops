# ERA secret naming + rotation template
# Purpose: Standardize Proton Pass item structure and Varlock references.

standard:
  vault: "Login"
  item_type: "Login"
  shared_item_title_format: "ERA_<SECRET_NAME>"
  system_item_title_format: "ERA_<SYSTEM>_<SECRET_NAME>"
  example_shared_item_title: "ERA_OPENROUTER_API_KEY"
  example_system_item_title: "ERA_FABRIC_INTERNAL_API_SECRET"
  required_secret_field: "password"
  optional_static_fields:
    username: "varlock"

metadata_note_template: |
  owner: <team-or-person>
  system: <system-name>
  environment: <dev|staging|prod|shared>
  secret_type: <api_key|db_password|token|jwt_secret|encryption_key>
  rotation_url: <provider-rotation-url>
  created_at: <YYYY-MM-DD>
  last_rotated_at: <YYYY-MM-DD>
  next_rotation_due: <YYYY-MM-DD>
  incident_rotation_required: <true|false>
  notes: <free-text>

rotation_policy_defaults:
  api_key_days: 90
  db_password_days: 60
  token_days: 30
  encryption_key_days: 180
  immediate_rotation_triggers:
    - "Secret found in plaintext file"
    - "Secret committed to git history"
    - "Secret copied into logs/chat/tickets"
    - "Compromised workstation or account"

varlock_reference_template:
  pattern: "protonPass(pass://Login/<ITEM_TITLE>/password)"
  examples:
    - "protonPass(pass://Login/ERA_ANTHROPIC_API_KEY/password)"
    - "protonPass(pass://Login/ERA_GEMINI_API_KEY/password)"
    - "protonPass(pass://Login/ERA_OPENROUTER_API_KEY/password)"
    - "protonPass(pass://Login/ERA_OPENROUTER_API_KEY_FALLBACK/password)"

active_varlock_mapping_2026_04_23:
  fabric_env_schema:
    - "ANTHROPIC_API_KEY -> pass://Login/ERA_ANTHROPIC_API_KEY/password"
    - "GEMINI_API_KEY -> pass://Login/ERA_GEMINI_API_KEY/password"
    - "OPENROUTER_API_KEY -> pass://Login/ERA_OPENROUTER_API_KEY/password"
  hermes_env_schema:
    - "OPENROUTER_API_KEY -> pass://Login/ERA_OPENROUTER_API_KEY/password"

new_secret_checklist:
  - "Create Proton Pass Login item in Login vault using shared_item_title_format or system_item_title_format"
  - "Set password field to secret value"
  - "Fill metadata note using metadata_note_template"
  - "Add/Update Varlock .env.schema reference"
  - "Run: varlock load --path <target-path>"
  - "Record rotation due date"

rotation_checklist:
  - "Generate new secret at provider"
  - "Update Proton Pass item password field"
  - "Update last_rotated_at and next_rotation_due"
  - "Run: varlock load --path <target-path>"
  - "Run dependent service health check"
  - "Revoke old secret after successful validation"
